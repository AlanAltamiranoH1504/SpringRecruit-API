<div class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">

    <!-- 🔹 STATS -->
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
      @for (stat of statsArray(); track stat.name) {
        <div class="rounded-xl border border-gray-400 bg-white p-6 shadow-sm">
          <div class="flex items-center justify-between">

            <div>
              <p class="text-sm text-gray-600">{{ stat.name }}</p>
              <div class="mt-2 flex items-baseline gap-2">
                <p class="text-3xl font-semibold text-gray-900">
                  {{ stat.value }}
                </p>
                <span class="text-sm font-medium text-green-600">
                  {{ stat.change }}
                </span>
              </div>
            </div>

            <div class="{{stat.bgColor}} {{stat.borderColor}} border  rounded-lg p-3">
              <span
                [class]="stat.color"
                class="h-6 w-6"
                [innerHTML]="sanitizer.bypassSecurityTrustHtml(stat.icon)">
              </span>
            </div>

          </div>
        </div>
      }
    </div>
    <div class="mt-8 grid gap-8 lg:grid-cols-3 items-start">
      <div class="lg:col-span-2 space-y-8">
        <app-active-jobs></app-active-jobs>
        <app-recent-applications/>
      </div>
      <div class="space-y-8">
        <app-quick-actions/>
      </div>
    </div>
  </div>
</div>
