<div class="space-y-6">
  <div class="flex items-center justify-between my-6">
    <h2 class="text-2xl font-semibold text-gray-900">
      Applicaciones Recientes
    </h2>
    <button class="text-blue-600 cursor-pointer font-semibold text-sm hover:text-blue-700 transition-colors">
      Ver todas
    </button>
  </div>

  <div class="space-y-4 border p-4 border-gray-400 bg-white rounded-lg">
    @if (isError()) {
      <div class="text-gray-500 text-sm font-semibold text-center">{{ isError() }}</div>
    } @else {
      <div class="overflow-y-scroll h-72 space-y-3 p-4">
        @for (app of recenteApplicatios(); track app.idApplication) {
          <div class="flex items-start gap-4 rounded-lg border shadow border-gray-400 p-4 hover:bg-gray-50 transition-colors">
            <div>
              <img
                alt="Img de avatar"
                class="max-h-16 rounded-full"
                src="https://globalyoungacademy.net/wp-content/uploads/gyaAvatars/1698918174-bpfull-600x600.png">
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div class="flex-1">
                  <div class="flex items-center gap-2">
                    <h4 class="font-semibold text-gray-900">
                      {{ app.nameCandidate }} {{app.surnameCandidate}}
                    </h4>
                  </div>
                  <p class="text-sm text-gray-600 mt-0.5">
                    {{ app.nameVacancy }}
                  </p>
                </div>
              </div>
              <p class="text-sm text-gray-600 mt-2">
                {{ app.commentsCandidate }}
              </p>

              <div class="mt-3 flex items-center justify-between">
                <div class="flex items-center gap-1 text-sm text-gray-500">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-clock">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                  <span>{{ app.applicationDate }}</span>
                </div>
                <div class="flex gap-2">
                  <button
                    (click)="rejectApplication(app.idApplication)"
                    class="border cursor-pointer font-semibold bg-red-50 hover:bg-red-100 px-3 py-1 rounded-lg text-red-600 border-red-600">
                    Rechazar
                  </button>
                  <button
                    class="border cursor-pointer font-semibold bg-green-50 hover:bg-green-100 px-3 py-1 rounded-lg text-green-400 border-green-400 ">
                    Ver perfil
                  </button>
                </div>
              </div>
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
