<div
  class="fixed inset-y-0 left-0 z-50 w-64 border-r border-r-gray-400 bg-white transition-transform duration-500 ease-in-out lg:translate-x-0">

  <div class="flex h-16 items-center border-b border-b-gray-400 px-6">
    <div class="flex items-center gap-3">
      <div
        class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-blue-600 to-blue-700 shadow-md">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
      </div>
      <span class="text-xl font-bold tracking-tight text-gray-900">Spring Recruiter</span>
    </div>
  </div>

  <nav class="p-4">
    <ul class="space-y-2">
      @for (nav of navigateData; track nav.name) {
        <li>
          <a
            [routerLink]="nav.route"
            routerLinkActive="bg-blue-50 text-blue-700"
            [routerLinkActiveOptions]="{exact: true}"
            class="group flex items-center gap-3 rounded-md px-3 py-2 text-gray-600 transition-all hover:bg-gray-100 hover:text-gray-900">

            <span class="flex h-5 w-5 items-center justify-center shrink-0"
                  [innerHTML]="sanitize.bypassSecurityTrustHtml(nav.icon)">
            </span>

            <span class="text-sm font-semibold">{{ nav.name }}</span>
          </a>
        </li>
      }
    </ul>
    <div className="mt-auto space-y-1 pt-4 border-t"></div>
  </nav>

</div>
