<header class="sticky top-0 z-40 flex h-16 items-center gap-4 border-b bg-white px-4 sm:px-6 lg:px-8">

  <div class="flex-1 flex items-center justify-between">
    <div class="relative flex items-center gap-4 max-w-md">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-search">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input type="text" class="pl-10 w-80 block px-3 py-2 border rounded-xl shadow-2xl"
             placeholder="Buscar candidatos, trabajos...">
    </div>
    <div class="flex items-center gap-4">
      <a
        routerLink="/dashboard/recruiter/profile"
      >
        <img
            class="rounded-full max-h-12"
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="Img perfil">
      </a>
      <div>
        <button
          (click)="logOut()"
          class="border px-3 py-2 flex bg-red-600 hover:bg-red-700 font-semibold rounded-xl text-white cursor-pointer transition-colors ">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-log-out">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" x2="9" y1="12" y2="12"/>
          </svg>

          Salir
        </button>
      </div>
    </div>
  </div>
</header>
