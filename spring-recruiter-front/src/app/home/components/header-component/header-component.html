<header class="sticky top-0 z-50 bg-white border-b backdrop-blur-sm bg-white/95">
  <div class="container mx-auto px-4 md:px-6">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </div>
        <span class="text-center text-2xl font-semibold">Spring Recruiter</span>
      </div>

      <nav class="hidden md:flex items-center gap-8">
        <a
          routerLink="/home/recruiter"
          routerLinkActive="text-blue-600 font-semibold"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-gray-700 text-lg cursor-pointer hover:text-blue-600 hover:font-semibold transition-colors"
        >Para Empresas</a>

        <a
          class="text-gray-700 text-lg cursor-pointer hover:text-blue-600 hover:font-semibold transition-colors"
        >Para Candidatos</a>

        <a
          class="text-gray-700 text-lg cursor-pointer hover:text-blue-600 hover:font-semibold transition-colors"
        >Recursos</a>
      </nav>

      <!--Computadora-->
      <div class="hidden md:flex items-center gap-4">
        <a
          routerLink="/login"
          class="text-white font-semibold bg-blue-600 hover:bg-blue-700 transition-colors cursor-pointer px-3 py-2 rounded-xl">Iniciar
          Sesión</a>
        <a
          routerLink="/register/candidate"
          class="text-white font-semibold bg-blue-600 hover:bg-blue-700 transition-colors cursor-pointer px-3 py-2 rounded-xl">Registrate</a>
      </div>
    </div>
  </div>
</header>
