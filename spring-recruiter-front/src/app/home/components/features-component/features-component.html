<section class="py-24 px-4 md:px-6 bg-white">
  <div class="container mx-auto">
    <div class="text-center max-w-3xl mx-auto mb-16">
      <h2 class="text-4xl md:text-5xl font-bold mb-4">Todo lo que necesitas para reclutar mejor</h2>
      <p class="text-xl text-gray-600">
        Herramientas poderosas diseñadas para hacer tu proceso de reclutamiento mas enficiente y efectivo
      </p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (feat of featuresArray; track feat.title; let i = $index) {
        <div class="border border-gray-400 hover:shadow-lg transition-all duration-300 hover:-translate-y-1 rounded-lg">
          <div class="p-6">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center mb-4 border border-gray-400 bg-blue-50">
              <div class="w-7 h-7 text-black" [innerHTML]="getSafeIcon(feat.icon)"></div>
            </div>
            <h3 class="text-xl font-semibold mb-2 text-blue-600 hover:text-blue-700">{{feat.title}}</h3>
            <p class="text-gray-600">{{feat.description}}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
