<section class="py-24 px-4 md:px-6 bg-gradient-to-b from-blue-50 to-white">
  <div class="container mx-auto">
    <div class="text-center max-w-3xl mx-auto mb-16">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 text-gray-900">
        Tu camino al éxito
      </h2>
      <p class="text-xl text-gray-600">
        Sigue estos cuatro pasos para conseguir tu próximo empleo
      </p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (step of stepsArray; track step.step; let i = $index) {
        <div class="relative group">
          <div class="text-center">
            <div class="relative inline-flex items-center justify-center mb-8">

              <div
                class="absolute w-28 h-28 bg-blue-100 rounded-full opacity-40 animate-pulse group-hover:scale-110 transition-transform duration-500"></div>

              <div
                class="absolute w-24 h-24 border-2 border-dashed border-blue-200 rounded-full group-hover:rotate-45 transition-transform duration-700"></div>

              <div
                class="relative w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 group-hover:shadow-blue-400 group-hover:-translate-y-1 transition-all duration-300 transform">

                <div class="w-10 h-10 text-white drop-shadow-md flex items-center justify-center"
                     [innerHTML]="getSafeIcon(step.icon)">
                </div>
              </div>

              <div
                class="absolute -top-3 -right-3 w-9 h-9 bg-white text-blue-900 rounded-full flex items-center justify-center font-bold text-sm shadow-md border-2 border-blue-50 z-10">
                {{ i + 1 }}
              </div>
            </div>

            <h3 class="text-xl font-bold mb-3 text-gray-800">{{ step.title }}</h3>
            <p class="text-gray-600 leading-relaxed px-4">{{ step.description }}</p>
          </div>

          @if (i < stepsArray.length - 1) {
            <div class="hidden lg:block absolute top-10 left-[70%] w-[60%] h-[2px]">
              <div class="w-full h-full bg-gradient-to-r from-blue-500 via-blue-200 to-transparent opacity-50"></div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</section>
